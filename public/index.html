<!DOCTYPE html>
<html>
  <head>
    <title>ChatApp</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="icon" href="#" type="image/x-icon" />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">ChatApp</a>
      </div>
    </nav>
    <div class="container-fluid" id="chatContainer">
      <center>
        <h1>Welcome to the ChatApp!</h1>
      </center>
      <div class="container-fluid" id="messageContainer">
        <div id="messages"></div>
      </div>
      <div class="container-fluid" id="inputContainer">
        <form id="inputMsgForm">
          <div class="input-group mb-3">
            <input
              type="text"
              id="input"
              class="form-control"
              placeholder="Enter the message"
            />
            <button class="btn btn-outline-secondary" type="button" id="button">
              Send
            </button>
          </div>
        </form>
      </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
